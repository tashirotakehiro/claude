<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EC商品企画 AIチーム</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117; color: #e2e8f0; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; background: #1a1d27;
      border-bottom: 1px solid #2d3148; flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    .badge { background: #3b5bdb; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; font-size: 12px;
      font-weight: 500; cursor: pointer; border: none; transition: all .15s;
    }
    .btn-primary { background: #3b5bdb; color: #fff; }
    .btn-primary:hover { background: #4c6ef5; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d3148; }
    .btn-ghost:hover { background: #1e2235; color: #e2e8f0; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-danger { background: #c92a2a; color: #fff; }
    .btn-danger:hover { background: #e03131; }

    /* ── Layout ── */
    .app-layout {
      display: flex; flex: 1; overflow: hidden; height: calc(100vh - 45px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; background: #141620; border-right: 1px solid #2d3148;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-section { padding: 12px; }
    .sidebar-title {
      font-size: 11px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .project-list { list-style: none; }
    .project-item {
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; margin-bottom: 2px; display: flex; align-items: center; gap: 8px;
      transition: background .1s;
    }
    .project-item:hover { background: #1e2235; }
    .project-item.active { background: #252a3a; color: #fff; }
    .project-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .project-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .project-delete {
      opacity: 0; background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; padding: 0 4px;
    }
    .project-item:hover .project-delete { opacity: 1; }

    /* ── Workflow ── */
    .workflow { padding: 12px; border-top: 1px solid #2d3148; }
    .workflow-step {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; padding: 4px 0; color: #64748b;
    }
    .workflow-step.active { color: #e2e8f0; font-weight: 600; }
    .workflow-step.done { color: #51cf66; }
    .workflow-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid #64748b; flex-shrink: 0;
    }
    .workflow-step.active .workflow-dot { border-color: #3b5bdb; background: #3b5bdb; }
    .workflow-step.done .workflow-dot { border-color: #51cf66; background: #51cf66; }

    /* ── Chat Area ── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg {
      max-width: 85%; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.7; white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-user {
      align-self: flex-end; background: #3b5bdb; color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg-agent {
      align-self: flex-start; background: #1e2235;
      border-bottom-left-radius: 3px;
    }
    .msg-agent-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .agent-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .agent-name { font-size: 11px; font-weight: 600; }
    .msg-content { font-size: 13px; line-height: 1.7; }
    .msg-content h1, .msg-content h2, .msg-content h3 { margin-top: 12px; margin-bottom: 6px; }
    .msg-content h3 { font-size: 14px; }
    .msg-content h2 { font-size: 15px; }
    .msg-content ul, .msg-content ol { padding-left: 20px; margin: 4px 0; }
    .msg-content table { border-collapse: collapse; margin: 8px 0; font-size: 12px; width: 100%; }
    .msg-content th, .msg-content td { border: 1px solid #2d3148; padding: 4px 8px; text-align: left; }
    .msg-content th { background: #252a3a; }
    .msg-content strong { color: #ffd43b; }
    .msg-content code { background: #252a3a; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .msg-typing {
      display: inline-flex; align-items: center; gap: 4px; padding: 10px 14px;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #64748b;
      animation: blink 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    /* Welcome */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; color: #64748b; text-align: center; padding: 40px;
    }
    .welcome h2 { font-size: 20px; color: #e2e8f0; margin-bottom: 8px; }
    .welcome p { font-size: 13px; margin-bottom: 20px; max-width: 400px; }

    /* ── Chat Input ── */
    .chat-input-area {
      padding: 12px 20px 16px; border-top: 1px solid #2d3148;
    }
    .quick-actions {
      display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .quick-action {
      background: #252a3a; color: #94a3b8; border: 1px solid #2d3148;
      padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer;
      transition: all .15s;
    }
    .quick-action:hover { background: #3b5bdb; color: #fff; border-color: #3b5bdb; }
    .chat-input-row {
      display: flex; gap: 8px;
    }
    .chat-input {
      flex: 1; background: #1e2235; border: 1px solid #2d3148;
      color: #e2e8f0; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; resize: none; font-family: inherit;
      outline: none; min-height: 42px; max-height: 120px;
    }
    .chat-input:focus { border-color: #3b5bdb; }
    .chat-input::placeholder { color: #4a5568; }
    .send-btn {
      background: #3b5bdb; border: none; color: #fff;
      width: 42px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; flex-shrink: 0;
    }
    .send-btn:hover { background: #4c6ef5; }
    .send-btn:disabled { background: #2d3148; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    /* ── Right Panel ── */
    .right-panel {
      width: 320px; background: #141620; border-left: 1px solid #2d3148;
      overflow-y: auto; flex-shrink: 0;
    }
    .right-panel-header {
      padding: 12px 16px; border-bottom: 1px solid #2d3148;
      font-size: 13px; font-weight: 600;
    }
    .research-section {
      padding: 8px 16px; border-bottom: 1px solid #1e2235;
      cursor: pointer; transition: background .1s;
    }
    .research-section:hover { background: #1a1d27; }
    .research-section-header {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
    }
    .research-check {
      width: 16px; height: 16px; border-radius: 3px;
      border: 1px solid #2d3148; display: flex; align-items: center;
      justify-content: center; font-size: 10px; flex-shrink: 0;
    }
    .research-check.done { background: #51cf66; border-color: #51cf66; color: #fff; }
    .research-section-title { flex: 1; }
    .research-section-content {
      display: none; padding: 8px 0 4px 24px;
      font-size: 12px; color: #94a3b8; line-height: 1.6;
    }
    .research-section.expanded .research-section-content { display: block; }
    .notion-sync-area {
      padding: 12px 16px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #1a1d27; border-radius: 12px; padding: 24px;
      border: 1px solid #2d3148; min-width: 360px;
    }
    .modal h3 { font-size: 15px; margin-bottom: 16px; }
    .modal input {
      width: 100%; background: #0f1117; border: 1px solid #2d3148;
      color: #e2e8f0; padding: 10px 12px; border-radius: 6px;
      font-size: 13px; margin-bottom: 16px; outline: none;
    }
    .modal input:focus { border-color: #3b5bdb; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d4160; }

    /* Markdown basic rendering */
    .msg-content h1 { font-size: 16px; border-bottom: 1px solid #2d3148; padding-bottom: 4px; }
    .msg-content h2 { font-size: 14px; }
    .msg-content h3 { font-size: 13px; color: #ffd43b; }
    .msg-content blockquote { border-left: 3px solid #3b5bdb; padding-left: 10px; margin: 6px 0; color: #94a3b8; }
    .msg-content hr { border: none; border-top: 1px solid #2d3148; margin: 8px 0; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>EC商品企画 AIチーム</h1>
    <span class="badge">10 Agents</span>
    <div class="header-right">
      <a href="/" class="btn btn-ghost btn-sm">Design Tool</a>
      <button class="btn btn-primary btn-sm" onclick="showNewProject()">+ 新規プロジェクト</button>
    </div>
  </header>

  <!-- App Layout -->
  <div class="app-layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">プロジェクト</div>
        <ul class="project-list" id="projectList"></ul>
      </div>
      <div class="workflow" id="workflowSection" style="display:none;">
        <div class="sidebar-title">ワークフロー</div>
        <div class="workflow-step" data-stage="1"><div class="workflow-dot"></div>アイデア生成</div>
        <div class="workflow-step" data-stage="2"><div class="workflow-dot"></div>マーケ調査</div>
        <div class="workflow-step" data-stage="3"><div class="workflow-dot"></div>LP/広告企画</div>
        <div class="workflow-step" data-stage="4"><div class="workflow-dot"></div>収益性判断</div>
        <div class="workflow-step" data-stage="5"><div class="workflow-dot"></div>最終判断</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcomeMessage">
          <h2>EC商品企画 AIチームへようこそ</h2>
          <p>10人のAIエージェントがチームとなって、商品アイデアの発案からマーケ調査、LP構成、バナー制作まで支援します。</p>
          <button class="btn btn-primary" onclick="showNewProject()">プロジェクトを作成して始める</button>
        </div>
      </div>
      <div class="chat-input-area" id="chatInputArea" style="display:none;">
        <div class="quick-actions" id="quickActions">
          <button class="quick-action" onclick="sendQuick('新しい商品アイデアを5つ提案してください')">アイデアを出して</button>
          <button class="quick-action" onclick="sendQuick('このアイデアをブラッシュアップしてください')">ブラッシュアップ</button>
          <button class="quick-action" onclick="sendQuick('マーケ調査を実施してください')">マーケ調査</button>
          <button class="quick-action" onclick="sendQuick('競合を分析してください')">競合分析</button>
          <button class="quick-action" onclick="sendQuick('LP構成案を作成してください')">LP構成案</button>
          <button class="quick-action" onclick="sendQuick('キャッチコピーとバナー案を作成してください')">コピー/バナー</button>
          <button class="quick-action" onclick="sendQuick('収益性を分析してください')">収益性分析</button>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力... (Enterで送信、Shift+Enterで改行)" rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel" id="rightPanel" style="display:none;">
      <div class="right-panel-header">マーケ調査 13セクション</div>
      <div id="researchSections"></div>
      <div class="notion-sync-area">
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="syncToNotion()">Notionに同期</button>
      </div>
    </div>
  </div>

  <!-- New Project Modal -->
  <div class="modal-overlay" id="newProjectModal">
    <div class="modal">
      <h3>新規プロジェクト作成</h3>
      <input type="text" id="newProjectName" placeholder="プロジェクト名（例: 肩こり解消デバイス）" />
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="hideNewProject()">キャンセル</button>
        <button class="btn btn-primary btn-sm" onclick="createProject()">作成</button>
      </div>
    </div>
  </div>

<script>
// ── State ──
let currentProjectId = null
let projects = []
let isSending = false

const RESEARCH_SECTIONS = [
  { key: 's1_overview', label: '1. 商品概要' },
  { key: 's2_differentiation', label: '2. 差別化ポイント' },
  { key: 's3_problems', label: '3. 悩み・課題' },
  { key: 's4_target', label: '4. ターゲット' },
  { key: 's5_volume', label: '5. ターゲット量の推測' },
  { key: 's6_price', label: '6. 想定販売価格' },
  { key: 's7_concerns', label: '7. 懸念点' },
  { key: 's8_competitors', label: '8. 他社の類似商品' },
  { key: 's9_buying_criteria', label: '9. 選び方・仕様要素' },
  { key: 's10_catchcopy', label: '10. キャッチコピー案' },
  { key: 's11_lp_structure', label: '11. LP構成案' },
  { key: 's12_product_specs', label: '12. 商品仕様' },
  { key: 's13_conclusion', label: '13. マーケ結論' },
]

const AGENT_ICONS = {
  'team-leader': 'TL', 'team-leader-synth': 'TL',
  'product-idea': 'ID', 'idea-refinement': 'BR',
  'market-research': 'MR', 'lp-structure': 'LP',
  'catchcopy-banner': 'CB', 'competitive-analysis': 'CA',
  'financial-viability': 'FV', 'sns-trend': 'SN',
  'review-analysis': 'RA',
}

// ── Init ──
async function init() {
  await loadProjects()
  renderResearchSections()
}

// ── Projects ──
async function loadProjects() {
  const res = await fetch('/api/agent/projects')
  projects = await res.json()
  renderProjects()
}

function renderProjects() {
  const list = document.getElementById('projectList')
  if (projects.length === 0) {
    list.innerHTML = '<li style="font-size:12px;color:#4a5568;padding:8px">プロジェクトがありません</li>'
    return
  }
  list.innerHTML = projects.map(p => `
    <li class="project-item ${p.id === currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <div class="project-status-dot" style="background:${getStageColor(p.currentStage)}"></div>
      <span class="project-name">${esc(p.name)}</span>
      <button class="project-delete" onclick="event.stopPropagation();deleteProject('${p.id}')" title="削除">&times;</button>
    </li>
  `).join('')
}

function getStageColor(stage) {
  const colors = { 1: '#e67700', 2: '#c2255c', 3: '#7048e8', 4: '#d6336c', 5: '#51cf66' }
  return colors[stage] || '#64748b'
}

async function selectProject(id) {
  currentProjectId = id
  renderProjects()
  const project = projects.find(p => p.id === id)
  if (project) {
    updateWorkflow(project.currentStage)
    updateResearchPanel(project.research)
    document.getElementById('workflowSection').style.display = ''
    document.getElementById('rightPanel').style.display = ''
    document.getElementById('chatInputArea').style.display = ''
    document.getElementById('welcomeMessage').style.display = 'none'
  }
  await loadConversation(id)
}

async function loadConversation(projectId) {
  const res = await fetch(`/api/agent/conversations/${projectId}`)
  const messages = await res.json()
  const container = document.getElementById('chatMessages')
  container.innerHTML = ''
  for (const msg of messages) {
    if (msg.role === 'user') {
      appendUserMessage(msg.content)
    } else {
      appendAgentMessage(msg.agentId || 'team-leader', msg.content)
    }
  }
  scrollToBottom()
}

function showNewProject() {
  document.getElementById('newProjectModal').classList.add('show')
  document.getElementById('newProjectName').focus()
}

function hideNewProject() {
  document.getElementById('newProjectModal').classList.remove('show')
  document.getElementById('newProjectName').value = ''
}

async function createProject() {
  const name = document.getElementById('newProjectName').value.trim()
  if (!name) return
  const res = await fetch('/api/agent/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  })
  const project = await res.json()
  hideNewProject()
  await loadProjects()
  selectProject(project.id)
}

async function deleteProject(id) {
  if (!confirm('このプロジェクトを削除しますか？')) return
  await fetch(`/api/agent/projects/${id}`, { method: 'DELETE' })
  if (currentProjectId === id) {
    currentProjectId = null
    document.getElementById('chatMessages').innerHTML = '<div class="welcome" id="welcomeMessage"><h2>EC商品企画 AIチームへようこそ</h2></div>'
    document.getElementById('chatInputArea').style.display = 'none'
    document.getElementById('workflowSection').style.display = 'none'
    document.getElementById('rightPanel').style.display = 'none'
  }
  await loadProjects()
}

// ── Workflow ──
function updateWorkflow(currentStage) {
  document.querySelectorAll('.workflow-step').forEach(el => {
    const stage = parseInt(el.dataset.stage)
    el.classList.remove('active', 'done')
    if (stage < currentStage) el.classList.add('done')
    else if (stage === currentStage) el.classList.add('active')
  })
}

// ── Research Panel ──
function renderResearchSections() {
  const container = document.getElementById('researchSections')
  container.innerHTML = RESEARCH_SECTIONS.map(s => `
    <div class="research-section" data-key="${s.key}" onclick="toggleSection(this)">
      <div class="research-section-header">
        <div class="research-check" id="check-${s.key}"></div>
        <div class="research-section-title">${s.label}</div>
      </div>
      <div class="research-section-content" id="content-${s.key}">未調査</div>
    </div>
  `).join('')
}

function toggleSection(el) { el.classList.toggle('expanded') }

function updateResearchPanel(research) {
  if (!research) return
  for (const s of RESEARCH_SECTIONS) {
    const check = document.getElementById(`check-${s.key}`)
    const content = document.getElementById(`content-${s.key}`)
    if (research[s.key]) {
      check.classList.add('done')
      check.textContent = '✓'
      content.textContent = research[s.key].substring(0, 200) + (research[s.key].length > 200 ? '...' : '')
    } else {
      check.classList.remove('done')
      check.textContent = ''
      content.textContent = '未調査'
    }
  }
}

// ── Chat ──
function appendUserMessage(text) {
  const container = document.getElementById('chatMessages')
  const div = document.createElement('div')
  div.className = 'msg msg-user'
  div.textContent = text
  container.appendChild(div)
}

function appendAgentMessage(agentId, content) {
  const container = document.getElementById('chatMessages')
  const div = document.createElement('div')
  div.className = 'msg msg-agent'
  div.id = `msg-${agentId}-${Date.now()}`

  const agents = window._agentMeta || {}
  const meta = agents[agentId] || { name: agentId, color: '#64748b' }
  const icon = AGENT_ICONS[agentId] || 'AI'

  div.innerHTML = `
    <div class="msg-agent-header">
      <div class="agent-avatar" style="background:${meta.color}">${icon}</div>
      <span class="agent-name" style="color:${meta.color}">${esc(meta.name)}</span>
    </div>
    <div class="msg-content">${renderMarkdown(content)}</div>
  `
  container.appendChild(div)
  return div
}

function appendTypingIndicator(agentId) {
  const container = document.getElementById('chatMessages')
  const div = document.createElement('div')
  div.className = 'msg msg-agent'
  div.id = `typing-${agentId}`

  const agents = window._agentMeta || {}
  const meta = agents[agentId] || { name: agentId, color: '#64748b' }
  const icon = AGENT_ICONS[agentId] || 'AI'

  div.innerHTML = `
    <div class="msg-agent-header">
      <div class="agent-avatar" style="background:${meta.color}">${icon}</div>
      <span class="agent-name" style="color:${meta.color}">${esc(meta.name)}</span>
    </div>
    <div class="msg-typing">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `
  container.appendChild(div)
  scrollToBottom()
  return div
}

function removeTypingIndicator(agentId) {
  const el = document.getElementById(`typing-${agentId}`)
  if (el) el.remove()
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages')
  container.scrollTop = container.scrollHeight
}

// ── Send Message ──
async function sendMessage() {
  const input = document.getElementById('chatInput')
  const text = input.value.trim()
  if (!text || isSending || !currentProjectId) return

  isSending = true
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('sendBtn').disabled = true

  appendUserMessage(text)
  scrollToBottom()

  // Streaming SSE
  const activeAgents = {}

  try {
    const response = await fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: currentProjectId, message: text }),
    })

    const reader = response.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break

      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop() || ''

      let currentEvent = null
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7)
        } else if (line.startsWith('data: ') && currentEvent) {
          try {
            const data = JSON.parse(line.slice(6))
            handleSSEEvent(currentEvent, data, activeAgents)
          } catch (e) { /* skip */ }
          currentEvent = null
        }
      }
    }
  } catch (err) {
    appendAgentMessage('team-leader', `エラーが発生しました: ${err.message}`)
  }

  isSending = false
  document.getElementById('sendBtn').disabled = false
  scrollToBottom()

  // Reload project state
  await loadProjects()
  const project = projects.find(p => p.id === currentProjectId)
  if (project) {
    updateWorkflow(project.currentStage)
    updateResearchPanel(project.research)
  }
}

function handleSSEEvent(event, data, activeAgents) {
  switch (event) {
    case 'agent-start':
      if (!window._agentMeta) window._agentMeta = {}
      window._agentMeta[data.agentId] = { name: data.agentName, color: data.color }
      removeTypingIndicator(data.agentId)
      appendTypingIndicator(data.agentId)
      activeAgents[data.agentId] = ''
      break

    case 'agent-chunk':
      activeAgents[data.agentId] = (activeAgents[data.agentId] || '') + data.text
      // Update typing indicator with partial content
      const typingEl = document.getElementById(`typing-${data.agentId}`)
      if (typingEl) {
        const contentEl = typingEl.querySelector('.msg-typing') || typingEl.querySelector('.msg-content')
        if (contentEl) {
          if (typingEl.querySelector('.msg-typing')) {
            // Replace typing dots with content area
            const meta = window._agentMeta[data.agentId] || {}
            typingEl.querySelector('.msg-typing').outerHTML = `<div class="msg-content">${renderMarkdown(activeAgents[data.agentId])}</div>`
          } else {
            contentEl.innerHTML = renderMarkdown(activeAgents[data.agentId])
          }
        }
      }
      scrollToBottom()
      break

    case 'agent-end':
      removeTypingIndicator(data.agentId)
      appendAgentMessage(data.agentId, data.text)
      scrollToBottom()
      break

    case 'error':
      appendAgentMessage('team-leader', `エラー: ${data.message}`)
      break
  }
}

function sendQuick(text) {
  document.getElementById('chatInput').value = text
  sendMessage()
}

// ── Input auto-resize + Enter handling ──
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('chatInput')
  input.addEventListener('input', () => {
    input.style.height = 'auto'
    input.style.height = Math.min(input.scrollHeight, 120) + 'px'
  })
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  })
  // Enter for new project modal
  document.getElementById('newProjectName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createProject()
  })

  // Load agents metadata
  fetch('/api/agent/agents').then(r => r.json()).then(agents => {
    window._agentMeta = {}
    for (const a of agents) window._agentMeta[a.id] = { name: a.name, color: a.color }
  })

  init()
})

// ── Helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderMarkdown(text) {
  if (!text) return ''
  return text
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold & italic
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Code
    .replace(/`(.+?)`/g, '<code>$1</code>')
    // Lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    // Tables (basic)
    .replace(/\|(.+)\|/g, (match) => {
      if (match.includes('---')) return ''
      const cells = match.split('|').filter(c => c.trim())
      const tag = cells.length > 0 ? 'td' : 'td'
      return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>'
    })
    // Wrap consecutive <tr> in <table>
    .replace(/((<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>')
    // Blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // HR
    .replace(/^---$/gm, '<hr>')
    // Line breaks
    .replace(/\n/g, '<br>')
    // Clean up
    .replace(/<br><h/g, '<h')
    .replace(/<\/h(\d)><br>/g, '</h$1>')
    .replace(/<br><li>/g, '<li>')
    .replace(/<\/li><br>/g, '</li>')
    .replace(/<br><table>/g, '<table>')
    .replace(/<\/table><br>/g, '</table>')
    .replace(/<br><blockquote>/g, '<blockquote>')
    .replace(/<\/blockquote><br>/g, '</blockquote>')
    .replace(/<br><hr>/g, '<hr>')
    .replace(/<hr><br>/g, '<hr>')
}
