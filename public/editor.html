<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>エディタ — デザインフィードバック</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117; color: #e2e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; background: #1a1d27;
      border-bottom: 1px solid #2d3148; flex-shrink: 0; min-height: 52px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: background .15s;
    }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d3148; }
    .btn-ghost:hover { background: #1e2235; color: #e2e8f0; }
    .btn-accent { background: #3b5bdb; color: #fff; }
    .btn-accent:hover { background: #4c6ef5; }
    .btn-green  { background: #2f9e44; color: #fff; }
    .btn-green:hover { background: #37b24d; }

    #title-field {
      flex: 1; background: transparent; border: none; color: #f1f5f9;
      font-size: 15px; font-weight: 600; outline: none;
      padding: 4px 8px; border-radius: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 340px; cursor: text;
    }
    #title-field:hover { background: #1e2235; }
    #title-field:focus { background: #1e2235; outline: 1px solid #3b5bdb; }

    .save-status { font-size: 12px; color: #475569; min-width: 60px; }
    .save-status.saving { color: #94a3b8; }
    .save-status.saved  { color: #2f9e44; }

    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .badge-ro { background: #1e3a5f; color: #60a5fa; font-size: 11px; padding: 2px 8px; border-radius: 4px; }

    /* Workspace */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* Canvas */
    .canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #090b10; display: flex; align-items: center; justify-content: center;
    }
    .viewer { width: 100%; height: 100%; overflow: auto; cursor: crosshair; display: none; }
    .viewer.active { display: block; }
    .viewer-inner { display: inline-flex; align-items: flex-start; justify-content: flex-start; padding: 32px; min-width: 100%; min-height: 100%; }
    .image-container { position: relative; display: inline-block; }
    #design-img { display: block; user-select: none; border-radius: 4px; box-shadow: 0 4px 40px rgba(0,0,0,.6); }

    /* Loading */
    .loading { color: #475569; font-size: 14px; }

    /* Zoom */
    .zoom-bar {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: none; gap: 4px; background: #1a1d27; border: 1px solid #2d3148;
      border-radius: 8px; padding: 4px;
    }
    .zoom-bar.on { display: flex; }
    .zb { width: 30px; height: 30px; border: none; background: transparent; color: #94a3b8; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background .1s, color .1s; }
    .zb:hover { background: #2d3148; color: #e2e8f0; }
    .zb.fit { font-size: 12px; width: 36px; }
    .zoom-lbl { font-size: 12px; color: #64748b; align-self: center; padding: 0 6px; min-width: 44px; text-align: center; }

    /* Pins */
    .pin {
      position: absolute; width: 26px; height: 26px;
      border-radius: 50% 50% 50% 0; transform: translate(-50%,-100%) rotate(-45deg);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.5); z-index: 10;
      transition: transform .12s, box-shadow .12s;
    }
    .pin:hover, .pin.active {
      transform: translate(-50%,-110%) rotate(-45deg) scale(1.15);
      box-shadow: 0 4px 16px rgba(0,0,0,.6); z-index: 20;
    }
    .pin span { transform: rotate(45deg); font-size: 10px; font-weight: 700; color: #fff; line-height: 1; }

    /* Popup */
    .popup {
      position: fixed; z-index: 200; background: #1a1d27;
      border: 1px solid #3b5bdb; border-radius: 10px; padding: 14px; width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
      animation: popIn .14s ease;
    }
    @keyframes popIn { from { opacity:0; transform:scale(.92) translateY(-4px) } to { opacity:1; transform:none } }
    .popup h4 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .popup textarea {
      width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px;
      color: #e2e8f0; font-size: 13px; padding: 8px; resize: none; height: 78px;
      font-family: inherit; line-height: 1.5; outline: none; transition: border-color .15s;
    }
    .popup textarea:focus { border-color: #3b5bdb; }
    .popup-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

    /* Sidebar */
    .sidebar {
      width: 320px; flex-shrink: 0; background: #1a1d27;
      border-left: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-head {
      padding: 12px 14px; border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .sb-title { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
    .ann-count { background: #2d3148; color: #94a3b8; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

    .ann-list { flex: 1; overflow-y: auto; padding: 8px; }
    .ann-list::-webkit-scrollbar { width: 4px; }
    .ann-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

    .ann-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: #475569; font-size: 13px; text-align: center; }

    .ann-card {
      background: #12151f; border: 1px solid #2d3148; border-radius: 8px;
      padding: 11px; margin-bottom: 6px; cursor: pointer;
      transition: border-color .15s, background .15s; position: relative;
    }
    .ann-card:hover  { border-color: #3b4a6b; background: #161929; }
    .ann-card.active { border-color: #3b5bdb; background: #161d33; }
    .ann-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .card-pin { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .card-coord { font-size: 11px; color: #475569; flex: 1; }
    .card-btns { display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
    .ann-card:hover .card-btns { opacity: 1; }
    .ib {
      width: 22px; height: 22px; border: none; background: transparent; color: #64748b;
      cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .ib:hover { background: #2d3148; color: #e2e8f0; }
    .ib.del:hover { background: #2a1616; color: #f87171; }
    .ann-text { font-size: 13px; color: #cbd5e1; line-height: 1.55; word-break: break-word; }
    .ann-text.hide { display: none; }
    .ann-edit { display: none; }
    .ann-edit.show { display: block; }
    .ann-edit textarea {
      width: 100%; background: #0f1117; border: 1px solid #3b5bdb; border-radius: 5px;
      color: #e2e8f0; font-size: 13px; padding: 7px; resize: vertical; min-height: 68px;
      font-family: inherit; line-height: 1.5; outline: none;
    }
    .ann-edit .ea { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
    .ann-edit .ea .btn { padding: 4px 10px; font-size: 12px; }

    .sb-foot {
      padding: 10px; border-top: 1px solid #2d3148;
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .sb-foot .btn { flex: 1; justify-content: center; padding: 6px 10px; font-size: 12px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: #1e2235; border: 1px solid #3b5bdb; color: #e2e8f0;
      padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0;
      pointer-events: none; transition: opacity .2s, transform .2s; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <a href="/" style="display:flex;align-items:center;gap:6px;color:#64748b;font-size:13px;text-decoration:none;flex-shrink:0;" onmouseover="this.style.color='#e2e8f0'" onmouseout="this.style.color='#64748b'">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    一覧
  </a>
  <span style="color:#2d3148;font-size:18px;margin:0 4px">|</span>
  <input id="title-field" type="text" maxlength="80" placeholder="タイトルを入力…" />
  <span class="save-status" id="save-status"></span>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-share">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      共有リンク
    </button>
  </div>
</header>

<div class="workspace">
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="loading" id="loading">読み込み中…</div>
    <div class="viewer" id="viewer">
      <div class="viewer-inner">
        <div class="image-container" id="img-container">
          <img id="design-img" alt="デザイン" draggable="false" />
        </div>
      </div>
    </div>
    <div class="zoom-bar" id="zoom-bar">
      <button class="zb" id="zb-out">−</button>
      <span class="zoom-lbl" id="zoom-lbl">100%</span>
      <button class="zb" id="zb-in">+</button>
      <button class="zb fit" id="zb-fit">Fit</button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sb-head">
      <span class="sb-title">指摘一覧</span>
      <span class="ann-count" id="ann-count">0 件</span>
    </div>
    <div class="ann-list" id="ann-list">
      <div class="ann-empty" id="ann-empty">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="color:#2d3148"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>画像上をクリックして<br>指摘を追加</span>
      </div>
    </div>
    <div class="sb-foot">
      <button class="btn btn-ghost" id="btn-exp-txt" disabled>テキスト出力</button>
      <button class="btn btn-ghost" id="btn-exp-json" disabled>JSON出力</button>
    </div>
  </aside>
</div>

<!-- Popup -->
<div class="popup" id="popup" style="display:none">
  <h4>指摘を入力</h4>
  <textarea id="popup-ta" placeholder="修正内容を入力…"></textarea>
  <div class="popup-actions">
    <button class="btn btn-ghost" id="btn-pp-cancel" style="padding:5px 12px;font-size:12px;">キャンセル</button>
    <button class="btn btn-accent" id="btn-pp-save" style="padding:5px 12px;font-size:12px;">追加</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Constants ────────────────────────────────────────────
const PIN_COLORS = [
  '#e03131','#1971c2','#2f9e44','#e67700','#6741d9',
  '#c2255c','#0c8599','#5c940d','#862e9c','#d9480f',
]

// ── State ────────────────────────────────────────────────
const params    = new URLSearchParams(location.search)
const sessionId = params.get('id')
let session     = null
let annotations = []
let nextId      = 1
let zoom        = 1
let activeId    = null
let pending     = null  // { xPct, yPct } during popup

// ── DOM ──────────────────────────────────────────────────
const viewer     = document.getElementById('viewer')
const imgEl      = document.getElementById('design-img')
const imgCont    = document.getElementById('img-container')
const zoomBar    = document.getElementById('zoom-bar')
const zoomLbl    = document.getElementById('zoom-lbl')
const annList    = document.getElementById('ann-list')
const annEmpty   = document.getElementById('ann-empty')
const annCount   = document.getElementById('ann-count')
const popup      = document.getElementById('popup')
const popupTA    = document.getElementById('popup-ta')
const titleField = document.getElementById('title-field')
const saveStatus = document.getElementById('save-status')

// ── Init ─────────────────────────────────────────────────
if (!sessionId) { location.href = '/' }
else loadSession()

async function loadSession() {
  try {
    session = await fetch(`/api/sessions/${sessionId}`).then(r => r.json())
    if (session.error) { location.href = '/'; return }
    titleField.value = session.title
    annotations = session.annotations || []
    nextId = annotations.reduce((m, a) => Math.max(m, a.id), 0) + 1
    document.title = session.title + ' — デザインフィードバック'

    imgEl.onload = () => {
      document.getElementById('loading').style.display = 'none'
      viewer.classList.add('active')
      zoomBar.classList.add('on')
      // Save natural dimensions
      if (!session.imageWidth) {
        fetch(`/api/sessions/${sessionId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageWidth: imgEl.naturalWidth, imageHeight: imgEl.naturalHeight }),
        })
      }
      fitZoom()
      renderPins()
    }
    imgEl.src = session.imageUrl
    renderList()
  } catch (e) {
    document.getElementById('loading').textContent = '読み込みエラー'
  }
}

// ── Save (debounced) ──────────────────────────────────────
let saveTimer
function scheduleSave() {
  saveStatus.textContent = '•••'
  saveStatus.className = 'save-status saving'
  clearTimeout(saveTimer)
  saveTimer = setTimeout(doSave, 1400)
}

async function doSave() {
  try {
    await fetch(`/api/sessions/${sessionId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ annotations }),
    })
    saveStatus.textContent = '保存済み ✓'
    saveStatus.className = 'save-status saved'
    setTimeout(() => { if (saveStatus.className === 'save-status saved') saveStatus.textContent = '' }, 3000)
  } catch {
    saveStatus.textContent = '保存失敗'
  }
}

// ── Title ─────────────────────────────────────────────────
titleField.addEventListener('blur', async () => {
  const t = titleField.value.trim() || '無題のデザイン'
  titleField.value = t
  await fetch(`/api/sessions/${sessionId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: t }),
  })
  document.title = t + ' — デザインフィードバック'
})

// ── Zoom ──────────────────────────────────────────────────
function applyZoom(z) {
  zoom = Math.min(4, Math.max(0.1, z))
  imgEl.style.width  = (imgEl.naturalWidth  * zoom) + 'px'
  imgEl.style.height = (imgEl.naturalHeight * zoom) + 'px'
  zoomLbl.textContent = Math.round(zoom * 100) + '%'
  renderPins()
}
function fitZoom() {
  const wrap = document.getElementById('canvas-wrap')
  const sx = (wrap.clientWidth  - 64) / imgEl.naturalWidth
  const sy = (wrap.clientHeight - 64) / imgEl.naturalHeight
  applyZoom(Math.min(sx, sy, 1))
}
document.getElementById('zb-in' ).addEventListener('click', () => applyZoom(zoom * 1.25))
document.getElementById('zb-out').addEventListener('click', () => applyZoom(zoom / 1.25))
document.getElementById('zb-fit').addEventListener('click', fitZoom)
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  if (!viewer.classList.contains('active')) return
  e.preventDefault()
  applyZoom(zoom * (e.deltaY < 0 ? 1.1 : 0.9))
}, { passive: false })

// ── Click to annotate ────────────────────────────────────
imgCont.addEventListener('click', e => {
  if (!viewer.classList.contains('active')) return
  if (popup.contains(e.target)) return
  closePopup()
  const rect = imgEl.getBoundingClientRect()
  const x = e.clientX - rect.left
  const y = e.clientY - rect.top
  if (x < 0 || y < 0 || x > imgEl.clientWidth || y > imgEl.clientHeight) return
  pending = {
    xPct: (x / imgEl.clientWidth)  * 100,
    yPct: (y / imgEl.clientHeight) * 100,
  }
  openPopup(e.clientX, e.clientY)
})

// ── Popup ─────────────────────────────────────────────────
function openPopup(cx, cy) {
  popup.style.display = 'block'
  popupTA.value = ''
  const pw = 260, ph = 168
  let l = cx + 14, t = cy - 20
  if (l + pw > window.innerWidth  - 8) l = cx - pw - 14
  if (t + ph > window.innerHeight - 8) t = window.innerHeight - ph - 8
  if (t < 8) t = 8
  popup.style.left = l + 'px'
  popup.style.top  = t + 'px'
  setTimeout(() => popupTA.focus(), 40)
}
function closePopup() { popup.style.display = 'none'; pending = null; popupTA.value = '' }

document.getElementById('btn-pp-cancel').addEventListener('click', closePopup)
document.getElementById('btn-pp-save').addEventListener('click', saveAnnotation)
popupTA.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveAnnotation() }
  if (e.key === 'Escape') closePopup()
})

function saveAnnotation() {
  const text = popupTA.value.trim()
  if (!text || !pending) return
  const ann = {
    id:    nextId++,
    xPct:  pending.xPct,
    yPct:  pending.yPct,
    text,
    color: PIN_COLORS[(annotations.length) % PIN_COLORS.length],
  }
  annotations.push(ann)
  closePopup()
  renderPins()
  renderList()
  setActive(ann.id)
  scheduleSave()
  toast(`指摘 #${ann.id} を追加しました`)
}

// ── Pins ─────────────────────────────────────────────────
function renderPins() {
  imgCont.querySelectorAll('.pin').forEach(p => p.remove())
  annotations.forEach(ann => {
    const pin = document.createElement('div')
    pin.className = 'pin' + (ann.id === activeId ? ' active' : '')
    pin.style.background = ann.color
    pin.style.left = ann.xPct + '%'
    pin.style.top  = ann.yPct + '%'
    pin.innerHTML  = `<span>${ann.id}</span>`
    pin.title      = ann.text
    pin.dataset.id = ann.id
    pin.addEventListener('click', e => { e.stopPropagation(); setActive(ann.id); scrollCard(ann.id) })
    imgCont.appendChild(pin)
  })
}

// ── List ─────────────────────────────────────────────────
function renderList() {
  const has = annotations.length > 0
  annEmpty.style.display = has ? 'none' : ''
  annCount.textContent   = annotations.length + ' 件'
  document.getElementById('btn-exp-txt').disabled  = !has
  document.getElementById('btn-exp-json').disabled = !has
  annList.querySelectorAll('.ann-card').forEach(c => c.remove())

  annotations.forEach(ann => {
    const card = document.createElement('div')
    card.className = 'ann-card' + (ann.id === activeId ? ' active' : '')
    card.dataset.id = ann.id
    card.innerHTML = `
      <div class="ann-card-head">
        <div class="card-pin" style="background:${ann.color}">${ann.id}</div>
        <span class="card-coord">${Math.round(ann.xPct)}%, ${Math.round(ann.yPct)}%</span>
        <div class="card-btns">
          <button class="ib edit" title="編集">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
          </button>
          <button class="ib del" title="削除">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div class="ann-text">${escHtml(ann.text)}</div>
      <div class="ann-edit">
        <textarea rows="3">${escHtml(ann.text)}</textarea>
        <div class="ea">
          <button class="btn btn-ghost ec" style="padding:4px 10px;font-size:12px;">キャンセル</button>
          <button class="btn btn-accent es" style="padding:4px 10px;font-size:12px;">保存</button>
        </div>
      </div>
    `
    card.addEventListener('click', e => {
      if (e.target.closest('.card-btns') || e.target.closest('.ann-edit')) return
      setActive(ann.id); scrollPin(ann.id)
    })
    card.querySelector('.ib.edit').addEventListener('click', e => { e.stopPropagation(); startEdit(card) })
    card.querySelector('.ib.del').addEventListener('click', e => { e.stopPropagation(); deleteAnn(ann.id) })
    card.querySelector('.ec').addEventListener('click', e => { e.stopPropagation(); endEdit(card) })
    card.querySelector('.es').addEventListener('click', e => {
      e.stopPropagation()
      const t = card.querySelector('.ann-edit textarea').value.trim()
      if (t) { ann.text = t; renderList(); renderPins(); scheduleSave(); toast('更新しました') }
      else endEdit(card)
    })
    card.querySelector('.ann-edit textarea').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); card.querySelector('.es').click() }
      if (e.key === 'Escape') endEdit(card)
    })
    annList.appendChild(card)
  })
}

function startEdit(card) {
  card.querySelector('.ann-text').classList.add('hide')
  const ae = card.querySelector('.ann-edit'); ae.classList.add('show')
  const ta = ae.querySelector('textarea'); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length)
}
function endEdit(card) {
  card.querySelector('.ann-text').classList.remove('hide')
  card.querySelector('.ann-edit').classList.remove('show')
}

function deleteAnn(id) {
  annotations = annotations.filter(a => a.id !== id)
  if (activeId === id) activeId = null
  renderPins(); renderList(); scheduleSave(); toast('削除しました')
}

// ── Active ────────────────────────────────────────────────
function setActive(id) {
  activeId = id; renderPins()
  annList.querySelectorAll('.ann-card').forEach(c => c.classList.toggle('active', +c.dataset.id === id))
}
function scrollCard(id) {
  const c = annList.querySelector(`[data-id="${id}"]`)
  if (c) c.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}
function scrollPin(id) {
  const p = imgCont.querySelector(`.pin[data-id="${id}"]`)
  if (p) p.scrollIntoView({ behavior: 'smooth', block: 'center' })
}

// ── Export ────────────────────────────────────────────────
document.getElementById('btn-exp-txt').addEventListener('click', () => {
  const lines = annotations.map(a => `[${a.id}] (${Math.round(a.xPct)}%, ${Math.round(a.yPct)}%)\n${a.text}`)
  download(new Blob([lines.join('\n\n')], { type: 'text/plain' }), 'feedback.txt')
  toast('テキストをダウンロードしました')
})
document.getElementById('btn-exp-json').addEventListener('click', () => {
  const data = annotations.map(({ id, xPct, yPct, text }) => ({ id, xPct: Math.round(xPct*100)/100, yPct: Math.round(yPct*100)/100, text }))
  download(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), 'feedback.json')
  toast('JSONをダウンロードしました')
})
function download(blob, name) {
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: name })
  a.click(); URL.revokeObjectURL(a.href)
}

// ── Share ─────────────────────────────────────────────────
document.getElementById('btn-share').addEventListener('click', () => {
  const url = `${location.origin}/viewer.html?id=${sessionId}`
  navigator.clipboard.writeText(url).then(() => toast('共有リンクをコピーしました'))
})

// ── Toast ─────────────────────────────────────────────────
const toastEl = document.getElementById('toast')
let toastTimer
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show')
  clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400)
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
</script>
