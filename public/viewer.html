<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>フィードバック確認 — デザインフィードバック</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117; color: #e2e8f0;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; background: #1a1d27;
      border-bottom: 1px solid #2d3148; flex-shrink: 0; min-height: 52px;
    }
    .badge-ro {
      background: #1a2e1a; color: #4ade80; font-size: 11px;
      padding: 3px 9px; border-radius: 4px; font-weight: 600; flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: background .15s; text-decoration: none;
    }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d3148; }
    .btn-ghost:hover { background: #1e2235; color: #e2e8f0; }
    .btn-accent { background: #3b5bdb; color: #fff; }
    .btn-accent:hover { background: #4c6ef5; }

    /* Workspace */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* Canvas */
    .canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #090b10; display: flex; align-items: center; justify-content: center;
    }
    .viewer { width: 100%; height: 100%; overflow: auto; display: none; }
    .viewer.active { display: block; }
    .viewer-inner { display: inline-flex; align-items: flex-start; justify-content: flex-start; padding: 32px; min-width: 100%; min-height: 100%; }
    .image-container { position: relative; display: inline-block; }
    #design-img { display: block; user-select: none; border-radius: 4px; box-shadow: 0 4px 40px rgba(0,0,0,.6); }

    .loading { color: #475569; font-size: 14px; }
    .error-msg { color: #f87171; font-size: 14px; text-align: center; }

    /* Zoom */
    .zoom-bar {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: none; gap: 4px; background: #1a1d27; border: 1px solid #2d3148;
      border-radius: 8px; padding: 4px;
    }
    .zoom-bar.on { display: flex; }
    .zb { width: 30px; height: 30px; border: none; background: transparent; color: #94a3b8; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background .1s, color .1s; }
    .zb:hover { background: #2d3148; color: #e2e8f0; }
    .zb.fit { font-size: 12px; width: 36px; }
    .zoom-lbl { font-size: 12px; color: #64748b; align-self: center; padding: 0 6px; min-width: 44px; text-align: center; }

    /* Pins — read-only, no hover cursor */
    .pin {
      position: absolute; width: 26px; height: 26px;
      border-radius: 50% 50% 50% 0; transform: translate(-50%,-100%) rotate(-45deg);
      cursor: default; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.5); z-index: 10;
      transition: transform .12s;
    }
    .pin.highlight { transform: translate(-50%,-110%) rotate(-45deg) scale(1.18); z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,.6); }
    .pin span { transform: rotate(45deg); font-size: 10px; font-weight: 700; color: #fff; line-height: 1; }

    /* Sidebar */
    .sidebar {
      width: 320px; flex-shrink: 0; background: #1a1d27;
      border-left: 1px solid #2d3148; display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-head {
      padding: 12px 14px; border-bottom: 1px solid #2d3148;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .sb-title { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
    .ann-count { background: #2d3148; color: #94a3b8; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

    .ann-list { flex: 1; overflow-y: auto; padding: 8px; }
    .ann-list::-webkit-scrollbar { width: 4px; }
    .ann-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }
    .ann-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #475569; font-size: 13px; }

    .ann-card {
      background: #12151f; border: 1px solid #2d3148; border-radius: 8px;
      padding: 11px; margin-bottom: 6px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .ann-card:hover  { border-color: #3b4a6b; background: #161929; }
    .ann-card.active { border-color: #3b5bdb; background: #161d33; }
    .ann-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .card-pin { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .ann-text { font-size: 13px; color: #cbd5e1; line-height: 1.55; word-break: break-word; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: #1e2235; border: 1px solid #3b5bdb; color: #e2e8f0;
      padding: 8px 18px; border-radius: 8px; font-size: 13px; opacity: 0;
      pointer-events: none; transition: opacity .2s, transform .2s; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <h1 id="page-title">読み込み中…</h1>
  <span class="badge-ro">読み取り専用</span>
  <div class="header-right">
    <button class="btn btn-ghost" id="btn-copy">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      このリンクをコピー
    </button>
    <a href="/" class="btn btn-ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      一覧に戻る
    </a>
  </div>
</header>

<div class="workspace">
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="loading" id="loading">読み込み中…</div>
    <div class="viewer" id="viewer">
      <div class="viewer-inner">
        <div class="image-container" id="img-container">
          <img id="design-img" alt="デザイン" draggable="false" />
        </div>
      </div>
    </div>
    <div class="zoom-bar" id="zoom-bar">
      <button class="zb" id="zb-out">−</button>
      <span class="zoom-lbl" id="zoom-lbl">100%</span>
      <button class="zb" id="zb-in">+</button>
      <button class="zb fit" id="zb-fit">Fit</button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sb-head">
      <span class="sb-title">指摘一覧</span>
      <span class="ann-count" id="ann-count">— 件</span>
    </div>
    <div class="ann-list" id="ann-list">
      <div class="ann-empty" id="ann-empty">読み込み中…</div>
    </div>
  </aside>
</div>

<div id="toast"></div>

<script>
const params    = new URLSearchParams(location.search)
const sessionId = params.get('id')
let annotations = []
let zoom = 1
let activeId = null

const viewer    = document.getElementById('viewer')
const imgEl     = document.getElementById('design-img')
const imgCont   = document.getElementById('img-container')
const zoomBar   = document.getElementById('zoom-bar')
const zoomLbl   = document.getElementById('zoom-lbl')
const annList   = document.getElementById('ann-list')
const annEmpty  = document.getElementById('ann-empty')
const annCount  = document.getElementById('ann-count')

if (!sessionId) { location.href = '/' }
else loadSession()

async function loadSession() {
  try {
    const session = await fetch(`/api/sessions/${sessionId}`).then(r => r.json())
    if (session.error) { showError('デザインが見つかりません'); return }

    document.getElementById('page-title').textContent = session.title
    document.title = session.title + ' — フィードバック確認'
    annotations = session.annotations || []

    imgEl.onload = () => {
      document.getElementById('loading').style.display = 'none'
      viewer.classList.add('active')
      zoomBar.classList.add('on')
      fitZoom()
      renderPins()
    }
    imgEl.src = session.imageUrl
    renderList()
  } catch {
    showError('読み込みに失敗しました')
  }
}

function showError(msg) {
  document.getElementById('loading').className = 'error-msg'
  document.getElementById('loading').textContent = msg
}

// ── Zoom ──────────────────────────────────────────────────
function applyZoom(z) {
  zoom = Math.min(4, Math.max(0.1, z))
  imgEl.style.width  = (imgEl.naturalWidth  * zoom) + 'px'
  imgEl.style.height = (imgEl.naturalHeight * zoom) + 'px'
  zoomLbl.textContent = Math.round(zoom * 100) + '%'
  renderPins()
}
function fitZoom() {
  const wrap = document.getElementById('canvas-wrap')
  const sx = (wrap.clientWidth  - 64) / imgEl.naturalWidth
  const sy = (wrap.clientHeight - 64) / imgEl.naturalHeight
  applyZoom(Math.min(sx, sy, 1))
}
document.getElementById('zb-in' ).addEventListener('click', () => applyZoom(zoom * 1.25))
document.getElementById('zb-out').addEventListener('click', () => applyZoom(zoom / 1.25))
document.getElementById('zb-fit').addEventListener('click', fitZoom)
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  if (!viewer.classList.contains('active')) return
  e.preventDefault()
  applyZoom(zoom * (e.deltaY < 0 ? 1.1 : 0.9))
}, { passive: false })

// ── Pins ─────────────────────────────────────────────────
function renderPins() {
  imgCont.querySelectorAll('.pin').forEach(p => p.remove())
  annotations.forEach(ann => {
    const pin = document.createElement('div')
    pin.className = 'pin' + (ann.id === activeId ? ' highlight' : '')
    pin.style.background = ann.color
    pin.style.left = ann.xPct + '%'
    pin.style.top  = ann.yPct + '%'
    pin.innerHTML  = `<span>${ann.id}</span>`
    pin.title      = ann.text
    pin.dataset.id = ann.id
    imgCont.appendChild(pin)
  })
}

// ── List ─────────────────────────────────────────────────
function renderList() {
  const has = annotations.length > 0
  annEmpty.style.display = has ? 'none' : ''
  annCount.textContent   = annotations.length + ' 件'
  annList.querySelectorAll('.ann-card').forEach(c => c.remove())
  if (!has) { annEmpty.textContent = '指摘はありません'; return }

  annotations.forEach(ann => {
    const card = document.createElement('div')
    card.className = 'ann-card' + (ann.id === activeId ? ' active' : '')
    card.dataset.id = ann.id
    card.innerHTML = `
      <div class="ann-card-head">
        <div class="card-pin" style="background:${ann.color}">${ann.id}</div>
        <span style="font-size:11px;color:#475569">#${ann.id}</span>
      </div>
      <div class="ann-text">${escHtml(ann.text)}</div>
    `
    card.addEventListener('click', () => {
      activeId = ann.id
      renderPins()
      annList.querySelectorAll('.ann-card').forEach(c => c.classList.toggle('active', +c.dataset.id === ann.id))
      scrollPin(ann.id)
    })
    annList.appendChild(card)
  })
}

function scrollPin(id) {
  const p = imgCont.querySelector(`.pin[data-id="${id}"]`)
  if (p) p.scrollIntoView({ behavior: 'smooth', block: 'center' })
}

// ── Copy link ─────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href).then(() => toast('リンクをコピーしました'))
})

// ── Toast ─────────────────────────────────────────────────
const toastEl = document.getElementById('toast')
let toastTimer
function toast(msg) {
  toastEl.textContent = msg; toastEl.classList.add('show')
  clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400)
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
</script>
</body>
</html>
