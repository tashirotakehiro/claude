<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デザインフィードバックツール</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }
    .header-badge {
      background: #3b5bdb;
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #3b5bdb; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #4c6ef5; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #2d3148; }
    .btn-ghost:not(:disabled):hover { background: #1e2235; color: #e2e8f0; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid #3d1f1f; }
    .btn-danger:not(:disabled):hover { background: #2a1616; }

    /* ── Layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Canvas area ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #090b10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Drop zone */
    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 2px dashed #2d3148;
      border-radius: 16px;
      width: 480px;
      max-width: 90%;
      padding: 60px 40px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .drop-zone.drag-over { border-color: #3b5bdb; background: #1a1f3a; }
    .drop-zone svg { color: #3b5bdb; }
    .drop-zone h2 { font-size: 17px; font-weight: 600; color: #f1f5f9; }
    .drop-zone p { font-size: 13px; color: #64748b; line-height: 1.6; }
    .drop-zone input[type=file] { display: none; }

    /* Image viewer */
    .viewer {
      position: relative;
      display: none;
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: crosshair;
    }
    .viewer.active { display: block; }
    .viewer-inner {
      position: relative;
      display: inline-block;
      min-width: 100%;
      min-height: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 24px;
    }
    #design-image {
      display: block;
      max-width: none;
      user-select: none;
      border-radius: 4px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
    }
    .image-container {
      position: relative;
      display: inline-block;
    }

    /* Zoom controls */
    .zoom-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 4px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 4px;
    }
    .zoom-controls.visible { display: flex; }
    .zoom-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .zoom-btn:hover { background: #2d3148; color: #e2e8f0; }
    .zoom-label { font-size: 12px; color: #64748b; align-self: center; padding: 0 6px; min-width: 44px; text-align: center; }

    /* ── Annotation pins ── */
    .pin {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: translate(-50%, -100%) rotate(-45deg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .pin:hover, .pin.active {
      transform: translate(-50%, -110%) rotate(-45deg) scale(1.15);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      z-index: 20;
    }
    .pin-number {
      transform: rotate(45deg);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: #1a1d27;
      border-left: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .annotation-count {
      background: #2d3148;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Annotation list */
    .annotation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .annotation-list::-webkit-scrollbar { width: 4px; }
    .annotation-list::-webkit-scrollbar-track { background: transparent; }
    .annotation-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

    .annotation-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #475569;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .annotation-card {
      background: #12151f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .annotation-card:hover { border-color: #3b4a6b; background: #161929; }
    .annotation-card.active { border-color: #3b5bdb; background: #161d33; }
    .annotation-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .card-pin {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .card-meta {
      font-size: 11px;
      color: #475569;
      flex: 1;
    }
    .card-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .annotation-card:hover .card-actions { opacity: 1; }
    .icon-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      font-size: 13px;
    }
    .icon-btn:hover { background: #2d3148; color: #e2e8f0; }
    .icon-btn.delete:hover { background: #2a1616; color: #f87171; }

    .annotation-text {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.55;
      word-break: break-word;
    }
    .annotation-text.editing { display: none; }
    .annotation-edit-area {
      display: none;
    }
    .annotation-edit-area.editing {
      display: block;
    }
    .annotation-edit-area textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #3b5bdb;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 13px;
      padding: 8px;
      resize: vertical;
      min-height: 72px;
      font-family: inherit;
      line-height: 1.55;
      outline: none;
    }
    .annotation-edit-area .edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      justify-content: flex-end;
    }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid #2d3148;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .sidebar-footer .btn { flex: 1; justify-content: center; }

    /* ── Annotation popup (inline input) ── */
    .popup {
      position: absolute;
      z-index: 100;
      background: #1a1d27;
      border: 1px solid #3b5bdb;
      border-radius: 10px;
      padding: 14px;
      width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      animation: popIn 0.15s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(-4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .popup h3 {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .popup textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      height: 80px;
      font-family: inherit;
      line-height: 1.55;
      outline: none;
      transition: border-color 0.15s;
    }
    .popup textarea:focus { border-color: #3b5bdb; }
    .popup-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: flex-end;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1e2235;
      border: 1px solid #3b5bdb;
      color: #e2e8f0;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <h1>デザインフィードバックツール</h1>
  <span class="header-badge">β</span>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-clear-image" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      画像を変更
    </button>
    <button class="btn btn-primary" id="btn-export" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      エクスポート
    </button>
  </div>
</header>

<div class="workspace">
  <!-- Canvas -->
  <div class="canvas-wrap" id="canvas-wrap">

    <!-- Drop zone -->
    <label class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
      <h2>デザイン画像をドロップ</h2>
      <p>JPG・PNG・WebP・GIF に対応<br>クリックしてファイルを選択することもできます</p>
    </label>

    <!-- Viewer -->
    <div class="viewer" id="viewer">
      <div class="viewer-inner" id="viewer-inner">
        <div class="image-container" id="image-container">
          <img id="design-image" src="" alt="デザイン" draggable="false" />
        </div>
      </div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls" id="zoom-controls">
      <button class="zoom-btn" id="btn-zoom-out" title="縮小">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" id="btn-zoom-in" title="拡大">+</button>
      <button class="zoom-btn" id="btn-zoom-fit" title="フィット" style="font-size:12px;width:36px;">Fit</button>
    </div>

  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">指摘一覧</span>
      <span class="annotation-count" id="annotation-count">0 件</span>
    </div>
    <div class="annotation-list" id="annotation-list">
      <div class="annotation-empty" id="annotation-empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:#2d3148">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>画像を読み込んで<br>クリックで指摘を追加</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" id="btn-export-text" disabled>テキスト</button>
      <button class="btn btn-ghost" id="btn-export-json" disabled>JSON</button>
      <button class="btn btn-danger" id="btn-clear-all" disabled>全削除</button>
    </div>
  </aside>
</div>

<!-- Inline annotation popup -->
<div class="popup" id="popup" style="display:none;">
  <h3>指摘を入力</h3>
  <textarea id="popup-textarea" placeholder="修正内容を入力してください…"></textarea>
  <div class="popup-actions">
    <button class="btn btn-ghost" id="btn-popup-cancel" style="padding:5px 12px;font-size:12px;">キャンセル</button>
    <button class="btn btn-primary" id="btn-popup-save" style="padding:5px 12px;font-size:12px;">追加</button>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  const PIN_COLORS = [
    '#e03131','#1971c2','#2f9e44','#e67700','#6741d9',
    '#c2255c','#0c8599','#5c940d','#862e9c','#d9480f',
  ];

  let annotations = [];   // { id, x, y, text, color }
  let nextId = 1;
  let zoom = 1;
  let pendingPin = null;  // { x, y } in image coords while popup open
  let activeId = null;
  let imageNaturalW = 0;
  let imageNaturalH = 0;

  // ── DOM refs ───────────────────────────────────────────
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const viewer        = document.getElementById('viewer');
  const imageEl       = document.getElementById('design-image');
  const imgContainer  = document.getElementById('image-container');
  const zoomControls  = document.getElementById('zoom-controls');
  const zoomLabel     = document.getElementById('zoom-label');
  const annotList     = document.getElementById('annotation-list');
  const annotEmpty    = document.getElementById('annotation-empty');
  const annotCount    = document.getElementById('annotation-count');
  const popup         = document.getElementById('popup');
  const popupTA       = document.getElementById('popup-textarea');
  const toast         = document.getElementById('toast');

  // ── Image load ─────────────────────────────────────────
  function loadImage(src) {
    imageEl.onload = () => {
      imageNaturalW = imageEl.naturalWidth;
      imageNaturalH = imageEl.naturalHeight;
      dropZone.style.display = 'none';
      viewer.classList.add('active');
      zoomControls.classList.add('visible');
      document.getElementById('btn-clear-image').disabled = false;
      document.getElementById('btn-export').disabled = false;
      fitZoom();
    };
    imageEl.src = src;
  }

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) readFile(file);
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) readFile(file);
  });

  // Paste support
  document.addEventListener('paste', e => {
    const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
    if (item) { const file = item.getAsFile(); if (file) readFile(file); }
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = ev => loadImage(ev.target.result);
    reader.readAsDataURL(file);
  }

  // Clear / change image
  document.getElementById('btn-clear-image').addEventListener('click', () => {
    if (annotations.length > 0 && !confirm('画像を変更すると指摘もリセットされます。続けますか?')) return;
    resetAll();
  });

  function resetAll() {
    annotations = [];
    nextId = 1;
    activeId = null;
    imageEl.src = '';
    viewer.classList.remove('active');
    zoomControls.classList.remove('visible');
    dropZone.style.display = '';
    fileInput.value = '';
    document.getElementById('btn-clear-image').disabled = true;
    document.getElementById('btn-export').disabled = true;
    closePopup();
    renderPins();
    renderList();
  }

  // ── Zoom ───────────────────────────────────────────────
  function applyZoom(z) {
    zoom = Math.min(4, Math.max(0.1, z));
    imageEl.style.width  = (imageNaturalW * zoom) + 'px';
    imageEl.style.height = (imageNaturalH * zoom) + 'px';
    zoomLabel.textContent = Math.round(zoom * 100) + '%';
    renderPins();
  }

  function fitZoom() {
    const wrap = document.getElementById('canvas-wrap');
    const padH = 48, padV = 48;
    const scaleX = (wrap.clientWidth  - padH) / imageNaturalW;
    const scaleY = (wrap.clientHeight - padV) / imageNaturalH;
    applyZoom(Math.min(scaleX, scaleY, 1));
  }

  document.getElementById('btn-zoom-in' ).addEventListener('click', () => applyZoom(zoom * 1.25));
  document.getElementById('btn-zoom-out').addEventListener('click', () => applyZoom(zoom / 1.25));
  document.getElementById('btn-zoom-fit').addEventListener('click', fitZoom);

  // Mouse wheel zoom
  document.getElementById('canvas-wrap').addEventListener('wheel', e => {
    if (!viewer.classList.contains('active')) return;
    e.preventDefault();
    applyZoom(zoom * (e.deltaY < 0 ? 1.1 : 0.9));
  }, { passive: false });

  // ── Click to annotate ──────────────────────────────────
  imgContainer.addEventListener('click', e => {
    if (!viewer.classList.contains('active')) return;
    if (e.target === popup || popup.contains(e.target)) return;
    closePopup();

    const rect = imageEl.getBoundingClientRect();
    const px = (e.clientX - rect.left)  / zoom;
    const py = (e.clientY - rect.top)   / zoom;

    // Clamp to image bounds
    if (px < 0 || py < 0 || px > imageNaturalW || py > imageNaturalH) return;

    pendingPin = { x: px, y: py };
    openPopup(e.clientX, e.clientY);
  });

  // ── Popup ──────────────────────────────────────────────
  function openPopup(cx, cy) {
    popup.style.display = 'block';
    popupTA.value = '';

    // Position near click, keep in viewport
    const pw = 260, ph = 170;
    let left = cx + 12;
    let top  = cy - 20;
    if (left + pw > window.innerWidth  - 8) left = cx - pw - 12;
    if (top  + ph > window.innerHeight - 8) top  = window.innerHeight - ph - 8;
    if (top < 8) top = 8;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';

    setTimeout(() => popupTA.focus(), 50);
  }

  function closePopup() {
    popup.style.display = 'none';
    pendingPin = null;
    popupTA.value = '';
  }

  document.getElementById('btn-popup-cancel').addEventListener('click', closePopup);

  document.getElementById('btn-popup-save').addEventListener('click', saveAnnotation);

  popupTA.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveAnnotation(); }
    if (e.key === 'Escape') closePopup();
  });

  function saveAnnotation() {
    const text = popupTA.value.trim();
    if (!text || !pendingPin) return;

    const ann = {
      id:    nextId++,
      x:     pendingPin.x,
      y:     pendingPin.y,
      text,
      color: PIN_COLORS[(annotations.length) % PIN_COLORS.length],
    };
    annotations.push(ann);
    closePopup();
    renderPins();
    renderList();
    setActive(ann.id);
    showToast(`指摘 #${ann.id} を追加しました`);
  }

  // ── Pins rendering ─────────────────────────────────────
  function renderPins() {
    // Remove old pins
    imgContainer.querySelectorAll('.pin').forEach(p => p.remove());

    annotations.forEach(ann => {
      const pin = document.createElement('div');
      pin.className = 'pin' + (ann.id === activeId ? ' active' : '');
      pin.style.background = ann.color;
      pin.style.left = (ann.x * zoom) + 'px';
      pin.style.top  = (ann.y * zoom) + 'px';
      pin.innerHTML  = `<span class="pin-number">${ann.id}</span>`;
      pin.title      = ann.text;
      pin.dataset.id = ann.id;
      pin.addEventListener('click', e => {
        e.stopPropagation();
        setActive(ann.id);
        scrollCardIntoView(ann.id);
      });
      imgContainer.appendChild(pin);
    });
  }

  // ── List rendering ─────────────────────────────────────
  function renderList() {
    const hasAnn = annotations.length > 0;
    annotEmpty.style.display = hasAnn ? 'none' : '';
    annotCount.textContent   = annotations.length + ' 件';

    const exportEnabled = hasAnn;
    document.getElementById('btn-export').disabled     = !exportEnabled;
    document.getElementById('btn-export-text').disabled = !exportEnabled;
    document.getElementById('btn-export-json').disabled = !exportEnabled;
    document.getElementById('btn-clear-all').disabled   = !exportEnabled;

    // Remove old cards (keep empty notice)
    annotList.querySelectorAll('.annotation-card').forEach(c => c.remove());

    annotations.forEach(ann => {
      const card = document.createElement('div');
      card.className = 'annotation-card' + (ann.id === activeId ? ' active' : '');
      card.dataset.id = ann.id;

      card.innerHTML = `
        <div class="annotation-card-header">
          <div class="card-pin" style="background:${ann.color}">${ann.id}</div>
          <span class="card-meta">X:${Math.round(ann.x)} Y:${Math.round(ann.y)}</span>
          <div class="card-actions">
            <button class="icon-btn edit" title="編集">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn delete" title="削除">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
        <div class="annotation-text">${escapeHtml(ann.text)}</div>
        <div class="annotation-edit-area">
          <textarea rows="3">${escapeHtml(ann.text)}</textarea>
          <div class="edit-actions">
            <button class="btn btn-ghost edit-cancel" style="padding:4px 10px;font-size:12px;">キャンセル</button>
            <button class="btn btn-primary edit-save" style="padding:4px 10px;font-size:12px;">保存</button>
          </div>
        </div>
      `;

      // Events
      card.addEventListener('click', e => {
        if (e.target.closest('.card-actions') || e.target.closest('.annotation-edit-area')) return;
        setActive(ann.id);
        scrollPinIntoView(ann.id);
      });

      card.querySelector('.icon-btn.edit').addEventListener('click', e => {
        e.stopPropagation();
        startEditCard(card, ann.id);
      });

      card.querySelector('.icon-btn.delete').addEventListener('click', e => {
        e.stopPropagation();
        deleteAnnotation(ann.id);
      });

      card.querySelector('.edit-cancel').addEventListener('click', e => {
        e.stopPropagation();
        endEditCard(card);
      });

      card.querySelector('.edit-save').addEventListener('click', e => {
        e.stopPropagation();
        const newText = card.querySelector('.annotation-edit-area textarea').value.trim();
        if (newText) { updateAnnotationText(ann.id, newText); }
        else endEditCard(card);
      });

      card.querySelector('.annotation-edit-area textarea').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          card.querySelector('.edit-save').click();
        }
        if (e.key === 'Escape') endEditCard(card);
      });

      annotList.appendChild(card);
    });
  }

  function startEditCard(card, id) {
    card.querySelector('.annotation-text').classList.add('editing');
    const ea = card.querySelector('.annotation-edit-area');
    ea.classList.add('editing');
    const ta = ea.querySelector('textarea');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }

  function endEditCard(card) {
    card.querySelector('.annotation-text').classList.remove('editing');
    card.querySelector('.annotation-edit-area').classList.remove('editing');
  }

  function updateAnnotationText(id, text) {
    const ann = annotations.find(a => a.id === id);
    if (ann) { ann.text = text; renderList(); renderPins(); showToast('更新しました'); }
  }

  function deleteAnnotation(id) {
    annotations = annotations.filter(a => a.id !== id);
    if (activeId === id) activeId = null;
    renderPins();
    renderList();
    showToast('削除しました');
  }

  // ── Clear all ──────────────────────────────────────────
  document.getElementById('btn-clear-all').addEventListener('click', () => {
    if (!confirm('すべての指摘を削除しますか？')) return;
    annotations = [];
    nextId = 1;
    activeId = null;
    renderPins();
    renderList();
    showToast('全指摘を削除しました');
  });

  // ── Active state ───────────────────────────────────────
  function setActive(id) {
    activeId = id;
    renderPins();
    // Highlight card
    annotList.querySelectorAll('.annotation-card').forEach(c => {
      c.classList.toggle('active', +c.dataset.id === id);
    });
  }

  function scrollCardIntoView(id) {
    const card = annotList.querySelector(`[data-id="${id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function scrollPinIntoView(id) {
    const pin = imgContainer.querySelector(`.pin[data-id="${id}"]`);
    if (pin) pin.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // ── Export ─────────────────────────────────────────────
  document.getElementById('btn-export').addEventListener('click', () => exportText());
  document.getElementById('btn-export-text').addEventListener('click', () => exportText());
  document.getElementById('btn-export-json').addEventListener('click', () => exportJson());

  function exportText() {
    if (!annotations.length) return;
    const lines = annotations.map(a =>
      `[${a.id}] (X:${Math.round(a.x)}, Y:${Math.round(a.y)})\n${a.text}`
    );
    const blob = new Blob([lines.join('\n\n')], { type: 'text/plain' });
    download(blob, 'feedback.txt');
    showToast('テキストをダウンロードしました');
  }

  function exportJson() {
    if (!annotations.length) return;
    const data = annotations.map(({ id, x, y, text }) => ({
      id,
      x: Math.round(x),
      y: Math.round(y),
      text,
    }));
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    download(blob, 'feedback.json');
    showToast('JSONをダウンロードしました');
  }

  function download(blob, name) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── Helpers ────────────────────────────────────────────
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
